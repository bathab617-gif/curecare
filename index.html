<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Care</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="login-container">
        <div class="login-card">
            <header class="login-header">
                <h1 class="logo-title">كيور كير</h1>
                <p class="logo-subtitle">مساعد طبي ذكي</p>
            </header>
            
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="username" class="input-label">اسم المستخدم</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        class="form-input" 
                        placeholder="أدخل اسم المستخدم"
                        required
                    >
                </div>
                <div class="input-group">
                    <label for="userInput" class="input-label">البريد الإلكتروني أو رقم الهاتف</label>
                    <div class="input-with-code">
                        <select id="countryCode" class="country-code">
                            <option value="+966">🇸🇦 +966</option>
                            <option value="+971">🇦🇪 +971</option>
                            <option value="+20">🇪🇬 +20</option>
                            <option value="+965">🇰🇼 +965</option>
                            <option value="+974">🇶🇦 +974</option>
                            <option value="+962">🇯🇴 +962</option>
                            <option value="+961">🇱🇧 +961</option>
                            <option value="+963">🇸🇾 +963</option>
                            <option value="+964">🇮🇶 +964</option>
                            <option value="+968">🇴🇲 +968</option>
                            <option value="+970">🇵🇸 +970</option>
                            <option value="+973">🇧🇭 +973</option>
                            <option value="+1">🇺🇸 +1</option>
                            <option value="+44">🇬🇧 +44</option>
                        </select>
                        <input 
                            type="text" 
                            id="userInput" 
                            name="userInput" 
                            class="form-input" 
                            placeholder="أدخل بريدك الإلكتروني أو رقم هاتفك"
                            required
                        >
                    </div>
                </div>
                
                <button type="submit" class="login-button" id="loginBtn">
                    تسجيل الدخول
                </button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
